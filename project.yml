name: MyTrails
options:
  bundleIdPrefix: dev.lfkdsk
  deploymentTarget:
    iOS: "17.0"
targets:
  MyTrails:
    type: application
    platform: iOS
    sources:
      - path: MyTrails
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lfkdsk.MyTrails
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        OTHER_LDFLAGS: "-lsqlite3"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: R6QM7B7GB7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MyTrails/MyTrails.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: MyTrails/Info.plist
      properties:
        CFBundleDisplayName: MyTrails
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: 记录徒步路线需要使用你的位置。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
